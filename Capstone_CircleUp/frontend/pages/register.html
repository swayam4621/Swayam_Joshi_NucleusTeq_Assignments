<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create account — CircleUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a href="login.html" class="brand"><span class="dot"></span>CircleUp</a>
    </header>

    <main class="auth-wrapper">
      <div class="auth-card">
        <span class="eyebrow">Get started</span>
        <h1>Create your account</h1>
        <p class="subtitle">Join activities near you, or start your own.</p>

        <div id="alert" class="alert alert-error" role="alert"></div>

        <form id="register-form" novalidate>
          <div class="field">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" autocomplete="name" required />
          </div>

          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="new-password" minlength="8" required />
            <span class="hint">At least 8 characters.</span>
          </div>

          <button type="submit" class="btn" id="submit-btn">Create account</button>
        </form>

        <p class="auth-switch">
          Already have an account? <a href="login.html">Log in</a>
        </p>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/register.js"></script>
</body>
</html>
