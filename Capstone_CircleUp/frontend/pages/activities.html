<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse activities — CircleUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a href="activities.html" class="brand"><span class="dot"></span>CircleUp</a>
      <nav class="nav-links">
        <a href="activities.html" class="active">Browse</a>
        <a href="create-activity.html">Create</a>
        <a href="my-activities.html">My Activities</a>
        <a href="profile.html">Profile</a>
      </nav>
      <div class="topbar-actions">
        <button class="btn-link" id="logout-btn" type="button">Log out</button>
      </div>
    </header>

    <main class="content-wrapper">
      <div class="content-header">
        <div>
          <h1>Browse activities</h1>
          <p class="subtitle">Find something happening near you.</p>
        </div>
        <a href="create-activity.html" class="btn btn-compact" style="text-decoration:none;">+ Create activity</a>
      </div>

      <form id="filter-form" class="filter-bar" novalidate>
        <div class="field">
          <label for="filter-category">Category</label>
          <input type="text" id="filter-category" placeholder="e.g. Cricket" />
        </div>
        <div class="field">
          <label for="filter-location">Location</label>
          <input type="text" id="filter-location" placeholder="e.g. Indore" />
        </div>
        <div class="field">
          <label for="filter-sort">Sort by date</label>
          <select id="filter-sort">
            <option value="asc">Soonest first</option>
            <option value="desc">Latest first</option>
          </select>
        </div>
        <button type="submit" class="btn">Apply filters</button>
        <button type="button" class="btn-secondary" id="clear-filters-btn">Clear</button>
      </form>

      <div id="alert" class="alert alert-error" role="alert"></div>

      <p class="skeleton" id="loading-msg">Loading activities…</p>

      <div id="activity-grid" class="activity-grid" style="display:none;"></div>

      <div id="empty-state" class="empty-state" style="display:none;">
        <h3>No activities found</h3>
        <p>Try adjusting your filters, or be the first to create one.</p>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/activity-helpers.js"></script>
  <script src="../js/activities.js"></script>
</body>
</html>
