<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — CircleUp</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <div class="page">
    <header class="topbar">
      <a href="login.html" class="brand"><span class="dot"></span>CircleUp</a>
    </header>

    <main class="auth-wrapper">
      <div class="auth-card">
        <span class="eyebrow">Welcome back</span>
        <h1>Log in</h1>
        <p class="subtitle">Pick up where you left off — your activities are waiting.</p>

        <div id="alert" class="alert alert-error" role="alert"></div>

        <form id="login-form" novalidate>
          <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" autocomplete="email" required />
          </div>

          <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" autocomplete="current-password" required />
          </div>

          <button type="submit" class="btn" id="submit-btn">Log in</button>
        </form>

        <p class="auth-switch">
          New to CircleUp? <a href="register.html">Create an account</a>
        </p>
      </div>
    </main>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/login.js"></script>
</body>
</html>
